<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceder - Clasificador de mensajes GACH</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background-color: var(--bg-color);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: 'Inter', sans-serif;
        }
        .auth-container {
            background: var(--card-bg);
            padding: 40px;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            width: 100%;
            max-width: 400px;
            border: 1px solid var(--border-color);
            text-align: center;
        }
        .auth-logo {
            height: 60px;
            margin-bottom: 24px;
        }
        .auth-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 8px;
        }
        .auth-subtitle {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 32px;
        }
        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 16px;
            text-align: left;
        }
        .auth-btn {
            width: 100%;
            margin-top: 8px;
            justify-content: center;
        }
        .auth-switch {
            margin-top: 24px;
            font-size: 0.9rem;
            color: var(--text-muted);
        }
        .auth-switch a {
            color: var(--primary-color);
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
        }
        #auth-message {
            margin-top: 16px;
            font-size: 0.9rem;
            padding: 12px;
            border-radius: var(--radius-sm);
            display: none;
        }
        .msg-error { background-color: rgba(239, 68, 68, 0.1); color: var(--danger); }
        .password-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }
        .password-wrapper input {
            padding-right: 40px;
        }
        .password-toggle {
            position: absolute;
            right: 12px;
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .password-toggle:hover {
            color: var(--text-main);
        }
        .generate-pwd-btn {
            background: none;
            border: none;
            color: var(--primary-color);
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            padding: 0;
            margin-top: 6px;
            display: inline-block;
        }
        .generate-pwd-btn:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="header-logo" style="display: flex; flex-direction: column; align-items: center; gap: 12px; margin-bottom: 24px;">
            <div class="logo-icon" style="background: linear-gradient(135deg, var(--primary-color), var(--primary-dark, #6d28d9)); width: 56px; height: 56px; border-radius: 16px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 12px rgba(139, 92, 246, 0.3);">
                <i data-lucide="message-square" style="color: white; width: 28px; height: 28px;"></i>
            </div>
            <h1 style="font-size: 1.25rem; font-weight: 700; color: var(--text-main); margin: 0; letter-spacing: -0.02em;">Clasificador de mensajes <span style="color: var(--primary-color);">GACH</span></h1>
        </div>
        <h2 class="auth-title" id="form-title">Iniciar Sesión</h2>
        <p class="auth-subtitle" id="form-subtitle">Ingresa para acceder a tus conjuntos y mensajes.</p>

        <form class="auth-form" id="auth-form">
            <div class="form-group">
                <label class="form-label">Correo Electrónico</label>
                <input type="email" id="email" class="form-control" required placeholder="tu@correo.com">
            </div>
            <div class="form-group">
                <label class="form-label">Contraseña</label>
                <div class="password-wrapper">
                    <input type="password" id="password" class="form-control" required placeholder="••••••••">
                    <button type="button" class="password-toggle" id="toggle-password" title="Mostrar/Ocultar contraseña">
                        <i data-lucide="eye" style="width: 18px; height: 18px;"></i>
                    </button>
                </div>
                <button type="button" class="generate-pwd-btn" id="generate-pwd-btn" style="display: none;">Generar contraseña segura</button>
            </div>
            
            <button type="submit" class="btn-primary auth-btn" id="submit-btn">Entrar</button>
        </form>

        <div id="auth-message"></div>

        <div class="auth-switch">
            <span id="switch-text">¿No tienes cuenta?</span> 
            <a id="switch-link">Regístrate aquí</a>
        </div>
    </div>

    <!-- Cargar dependencias web de vite/supabase -->
    <script type="module" src="/src/auth.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
